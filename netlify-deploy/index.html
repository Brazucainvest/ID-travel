function resizeImage(file,maxPx=900){
  return new Promise(resolve=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg',0.82).split(',')[1]);
    };
    img.src=url;
  });
}

async function analyzeFood(b64,key){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1024,messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
      {type:'text',text:`Analyser matbildet og estimer næringsinnhold. Svar KUN med en JSON-array, ingen annen tekst. Hvert element skal ha feltene: name (norsk matvare), portion (f.eks. "ca. 250g"), protein (heltall gram), carbs (heltall gram), fat (heltall gram), kcal (heltall). List hvert hovedelement separat. Estimer realistiske porsjoner fra det du ser.`}
    ]}]})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Feil ${r.status}`);}
  const d=await r.json();
  const txt=d.content[0].text.trim();
  const m=txt.match(/\[[\s\S]*?\]/);
  if(!m)throw new Error('Kunne ikke tolke AI-svar');
  return JSON.parse(m[0]);
}

const getWeekNum=s=>{if(!s)return null;const d=Math.floor((Date.now()-new Date(s).getTime())/604800000)+1;return Math.min(Math.max(d,1),12)};
const getPhase=w=>{if(!w)return null;return PHASES.find(p=>w>=p.range[0]&&w<=p.range[1])};
const getRunning=w=>{if(!w)return null;return RUNNING.find(r=>w>=r.w[0]&&w<=r.w[1])};

// ─── UTILITY COMPONENTS ───────────────────────────────────────
function Ring({value,max,color,size=84,stroke=8,label,sub}){
  const r=(size-stroke*2)/2,c=2*Math.PI*r,pct=Math.min(value/max,1),off=c-pct*c;
  const glowId=`g${color.replace('#','')}${size}`;
  return<div className="flex flex-col items-center">
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      {pct>0.15&&<defs><filter id={glowId} x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter></defs>}
      <circle className="ring-bg" cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={stroke}/>
      <circle className="ring-fg" cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={stroke} stroke={color} strokeDasharray={c} strokeDashoffset={off} filter={pct>0.15?`url(#${glowId})`:undefined}/>
    </svg>
    <div className="text-center -mt-0.5">
      <div className="text-white font-black text-sm">{label}</div>
      {sub&&<div className="text-slate-400 text-xs">{sub}</div>}
    </div>
  </div>;
}

// ─── REST TIMER ───────────────────────────────────────────────
function RestTimer({onClose}){
  const[secs,setSecs]=useState(90);
  const[total,setTotal]=useState(90);
  const[on,setOn]=useState(true);
  const ref=useRef();
  useEffect(()=>{
    if(on){ref.current=setInterval(()=>setSecs(s=>{
      if(s<=1){clearInterval(ref.current);setOn(false);if('vibrate'in navigator)navigator.vibrate([200,100,200]);return 0;}
      return s-1;
    }),1000);}else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[on]);
  const preset=t=>{clearInterval(ref.current);setSecs(t);setTotal(t);setOn(true);};
  const pct=total>0?secs/total*100:0;
  const bar=pct>50?'#3b82f6':pct>20?'#f59e0b':'#ef4444';
  const mm=String(Math.floor(secs/60)).padStart(2,'0'),ss=String(secs%60).padStart(2,'0');
  return<div className="fixed inset-0 z-50 flex items-center justify-center px-4" style={{background:'rgba(0,0,0,0.9)'}}>
    <div className="rounded-3xl w-full max-w-md p-6 su" style={{background:'rgba(8,15,30,0.98)',border:'1px solid rgba(255,255,255,0.1)'}}>
      <div className="flex justify-between items-center mb-4"><span className="font-bold text-white text-lg">⏱ Hviletimer</span><button onClick={onClose} className="text-slate-400 text-2xl">✕</button></div>
      <div className={`text-6xl font-black text-center mb-2 ${secs===0?'text-green-400':'text-blue-400'}`} style={{fontVariantNumeric:'tabular-nums'}}>{secs===0?'✅ GÅ!':`${mm}:${ss}`}</div>
      <div className="h-2 rounded-full mb-5 overflow-hidden" style={{background:'rgba(255,255,255,0.07)'}}><div className="h-full rounded-full transition-all duration-1000" style={{width:`${pct}%`,background:bar}}/></div>
      <div className="flex gap-2 justify-center mb-4">
        {[60,90,120,180].map(t=><button key={t} onClick={()=>preset(t)} className={`px-3 py-2 rounded-xl text-sm font-bold border-2 ${total===t?'border-blue-500 text-blue-400':'border-white border-opacity-10 text-slate-400'}`} style={total===t?{background:'rgba(59,130,246,0.15)'}:{}}>{t===60?'1min':t===90?'90s':t===120?'2min':'3min'}</button>)}
      </div>
      <div className="flex gap-3">
        <button onClick={()=>{clearInterval(ref.current);setOn(o=>!o);}} className="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold">{on?'⏸ Pause':'▶ Start'}</button>
        <button onClick={()=>{clearInterval(ref.current);setSecs(total);setOn(true);}} className="glass text-white px-5 py-3 rounded-2xl font-bold">↺</button>
      </div>
    </div>
  </div>;
}

function ActiveWorkout({workout,onBack,onDone,retroMode=false,editSession=null}){
  const[idx,setIdx]=useState(0);
  const[log,setLog]=useState(()=>{
    if(editSession)return JSON.parse(JSON.stringify(editSession.log));
    const o={};workout.exercises.forEach(e=>{o[e.id]=Array.from({length:e.sets},()=>({w:'',r:'',done:false}));});return o;
  });
  const[timer,setTimer]=useState(false);
  const[finish,setFinish]=useState(false);
  const[showNav,setShowNav]=useState(false);
  const[retroDate,setRetroDate]=useState(()=>editSession?.date?.slice(0,10)||todayStr());
  const prevSession=useMemo(()=>{const sess=ld('fc_sessions',[]);const f=editSession?sess.filter(s=>s.id!==editSession.id):sess;return[...f].reverse().find(s=>s.workoutId===workout.id)||null;},[workout.id]);
  const ex=workout.exercises[idx];
  const sets=log[ex.id];
  const done=sets.filter(s=>s.done).length;
  const prevSets=(prevSession?.log?.[ex.id]||[]).filter(s=>s.done&&s.w&&s.r);
  const total=workout.exercises.length;
  const totalDoneSets=workout.exercises.reduce((a,e)=>(log[e.id]||[]).filter(s=>s.done).length+a,0);
  const totalSets=workout.exercises.reduce((a,e)=>a+e.sets,0);
  const prog=totalDoneSets/totalSets*100;
  const upd=(i,f,v)=>setLog(p=>({...p,[ex.id]:p[ex.id].map((s,j)=>j===i?{...s,[f]:v}:s)}));
  const toggle=i=>setLog(p=>{
    const u=p[ex.id].map((s,j)=>j===i?{...s,done:!s.done}:s);
    if(!p[ex.id][i].done&&!retroMode&&!editSession)setTimeout(()=>setTimer(true),300);
    return{...p,[ex.id]:u};
  });
  const saveSession=()=>{
    const sess=ld('fc_sessions',[]);
    const prs=ld('fc_prs',{});
    Object.entries(log).forEach(([exId,sets])=>{
      sets.forEach(s=>{
        if(s.done&&s.w&&s.r){
          const vol=(parseFloat(s.w)||0)*(parseInt(s.r)||0);
          const prev=prs[exId];
          if(!prev||vol>prev.vol||parseFloat(s.w)>parseFloat(prev.w)){
            prs[exId]={w:s.w,r:s.r,vol,date:new Date().toISOString().slice(0,10)};
          }
        }
      });
    });
    sv('fc_prs',prs);
    if(editSession){
      sv('fc_sessions',sess.map(s=>s.id===editSession.id?{...s,date:retroDate+'T12:00:00.000Z',log:JSON.parse(JSON.stringify(log))}:s));
    } else {
      sess.push({id:Date.now(),date:retroMode?retroDate+'T12:00:00.000Z':new Date().toISOString(),workoutId:workout.id,workoutTitle:workout.title,log:JSON.parse(JSON.stringify(log))});
      sv('fc_sessions',sess);
    }
    onDone();
  };
  return<div className="min-h-screen flex flex-col" style={{background:'#060c18'}}>
    <div className="text-white px-4 pt-4 pb-3" style={{background:`linear-gradient(135deg,${workout.from},${workout.to})`}}>
      <div className="flex items-center justify-between mb-2">
        <button onClick={()=>{if(confirm('Avbryte?'))onBack();}} className="bg-white bg-opacity-20 rounded-xl px-3 py-1.5 text-sm font-medium">← Avbryt</button>
        {/* Tappable exercise nav trigger */}
        <button onClick={()=>setShowNav(true)} className="flex items-center gap-1.5 bg-white bg-opacity-20 rounded-xl px-3 py-1.5">
          <span className="text-sm font-black">{idx+1}/{total}</span>
          <span className="text-xs opacity-80">øvelser ▾</span>
        </button>
        <button onClick={()=>setFinish(true)} className="bg-white bg-opacity-20 rounded-xl px-3 py-1.5 text-sm font-medium">Lagre</button>
      </div>
      <div className="h-1.5 bg-white bg-opacity-20 rounded-full overflow-hidden"><div className="h-full bg-white rounded-full transition-all duration-500" style={{width:`${prog}%`}}/></div>
      {(retroMode||editSession)&&<div className="flex items-center gap-2 mt-2 bg-white bg-opacity-10 rounded-xl px-3 py-2">
        <span className="text-white text-xs opacity-80">📅 Dato for økt:</span>
        <input type="date" value={retroDate} onChange={e=>setRetroDate(e.target.value)} className="flex-1 bg-transparent text-white text-sm font-bold focus:outline-none min-w-0"/>
      </div>}
    </div>
    <ExImg url={ex.img} name={ex.name}/>
    <div className="px-4 pt-4 pb-2 su" key={ex.id}>
      <div className="flex justify-between items-start mb-1">
        <div className="flex-1 pr-2">
          <h2 className="text-white font-black text-xl leading-tight">{ex.name}</h2>
          <p className="text-slate-500 text-xs">{ex.en}</p>
        </div>
        <div className="text-right flex-shrink-0">
          <div className="text-white font-black text-2xl">{ex.sets}×{ex.reps}</div>
          {ex.repsNote&&<div className="text-slate-400 text-xs">{ex.repsNote}</div>}
        </div>
      </div>
      <div className="flex flex-wrap gap-2 mt-2">
        <span className="bg-blue-900 bg-opacity-60 text-blue-300 text-xs font-bold px-3 py-1 rounded-full">🎯 {ex.focus}</span>
        <span className="bg-slate-800 text-slate-300 text-xs px-3 py-1 rounded-full">🔧 {ex.eq}</span>
        {(()=>{const pr=ld('fc_prs',{})[ex.id];return pr?<span className="bg-yellow-900 bg-opacity-50 text-yellow-400 text-xs font-bold px-3 py-1 rounded-full">🏆 PR: {pr.w}kg×{pr.r}</span>:null;})()}
      </div>
      <div className="bg-slate-800 bg-opacity-60 rounded-xl p-3 mt-2"><span className="text-slate-400 text-xs">💡 {ex.tip}</span></div>
    </div>
    <div className="px-4 flex-1 overflow-y-auto pb-2">
      <div className="flex justify-between items-center mb-2">

        <button onClick={()=>setTimer(true)} className="text-xs bg-slate-800 text-blue-400 font-bold px-3 py-1.5 rounded-full">⏱ Hvile</button>
      </div>
      {prevSets.length>0&&<div className="bg-slate-700 bg-opacity-60 rounded-xl px-3 py-2 mb-2 flex items-center gap-2 flex-wrap">

      <div className="grid grid-cols-12 gap-2 mb-2 px-1">

      </div>

}

// ─── STYRKEHISTORIKK ──────────────────────────────────────────
function StrengthHistory(){
  const sessions=ld('fc_sessions',[]);
  const prs=ld('fc_prs',{});
  // build per-exercise history
  const history={};
  sessions.forEach(sess=>{
    Object.entries(sess.log||{}).forEach(([exId,sets])=>{
      if(!history[exId])history[exId]=[];
      const best=sets.filter(s=>s.done&&s.w&&s.r).reduce((b,s)=>{
        const v=(parseFloat(s.w)||0)*(parseInt(s.r)||0);
        return(!b||v>b.vol)?{w:s.w,r:s.r,vol:v}:b;
      },null);
      if(best)history[exId].push({date:sess.date.slice(0,10),w:best.w,r:best.r,vol:best.vol});
    });
  });
  const workoutsWithData=WORKOUTS.filter(wk=>wk.exercises.some(e=>history[e.id]?.length));
  if(!workoutsWithData.length)return(
    <div className="glass rounded-2xl p-8 text-center">
      <div className="text-4xl mb-3">📊</div>
      <div className="text-slate-300 font-bold">Ingen styrkedata enda</div>
      <div className="text-slate-500 text-sm mt-1">Logg din første økt for å se fremgang</div>
    </div>
  );
  return<div className="space-y-4">
    {WORKOUTS.map(wk=>{
      const exWithData=wk.exercises.filter(e=>history[e.id]?.length);
      if(!exWithData.length)return null;
      return<div key={wk.id} className="glass rounded-2xl overflow-hidden">
        <div className="px-4 py-3 border-b border-white border-opacity-5 flex items-center gap-2">
          <span className="text-xl">{wk.emoji}</span>
          <span className="text-white font-bold text-sm">{wk.title}</span>
        </div>
        {exWithData.map(ex=>{
          const hist=history[ex.id]||[];
          const pr=prs[ex.id];
          const latest=hist[hist.length-1];
          const prev=hist.length>1?hist[hist.length-2]:null;
          const improved=prev&&latest&&parseFloat(latest.w)>parseFloat(prev.w);
          return<div key={ex.id} className="px-4 py-3 border-b border-white border-opacity-5 last:border-0">
            <div className="flex justify-between items-start mb-1">
              <div className="flex-1 min-w-0 pr-2">
                <div className="text-white text-sm font-semibold truncate">{ex.name}</div>
                <div className="text-slate-500 text-xs">{hist.length} loggede sett-dager</div>
              </div>
              <div className="text-right flex-shrink-0">
                {pr&&<div className="text-yellow-400 text-sm font-black">🏆 {pr.w}kg×{pr.r}</div>}
                {improved&&<div className="text-green-400 text-xs">↑ +{(parseFloat(latest.w)-parseFloat(prev.w)).toFixed(1)}kg</div>}
              </div>
            </div>
            {/* Mini chart bars */}
            {hist.length>1&&<div className="flex items-end gap-1 h-8 mt-1">
              {hist.slice(-8).map((h,i)=>{
                const maxVol=Math.max(...hist.slice(-8).map(x=>x.vol));
                const pct=maxVol>0?h.vol/maxVol:0;
                const isLast=i===hist.slice(-8).length-1;
                return<div key={i} className="flex-1 rounded-sm transition-all" style={{height:`${Math.max(pct*100,8)}%`,background:isLast?'#22c55e':'#334155'}}/>;
              })}
            </div>}
            {hist.length>0&&<div className="text-slate-500 text-xs mt-1">Sist: {hist[hist.length-1].w}kg × {hist[hist.length-1].r} reps · {hist[hist.length-1].date}</div>}
          </div>;
        })}
      </div>;
    })}
  </div>;
}

// ─── WATER TRACKER ────────────────────────────────────────────
function WaterTracker(){
  const today=todayStr();
  const[water,setWater]=useState(()=>ld('fc_water',{}));
  const count=water[today]||0;
  const goal=8;
  const upd=n=>{const v=Math.max(0,Math.min(n,goal+2));const w={...water,[today]:v};setWater(w);sv('fc_water',w);};
  const pct=Math.min(count/goal*100,100);
  return<div className="glass rounded-2xl p-4">
    <div className="flex justify-between items-center mb-3">
      <div>
        <div className="text-white font-bold text-sm">💧 Vann i dag</div>
        <div className="text-slate-400 text-xs">Mål: {goal} glass (~2L)</div>
      </div>
      <div className="text-right">
        <div className={`text-2xl font-black ${count>=goal?'text-blue-400':'text-white'}`}>{count}/{goal}</div>
        {count>=goal&&<div className="text-blue-400 text-xs font-bold">✅ Mål nådd!</div>}
      </div>
    </div>
    <div className="h-2 rounded-full mb-4 overflow-hidden" style={{background:'rgba(255,255,255,0.07)'}}>
      <div className="h-full rounded-full transition-all duration-300" style={{width:`${pct}%`,background:'linear-gradient(90deg,#3b82f6,#60a5fa)'}}/>
    </div>
    <div className="flex gap-2">
      {Array.from({length:goal},(_, i)=>(
        <button key={i} onClick={()=>upd(count<=i?i+1:i)}
          className={`flex-1 h-8 rounded-lg transition-all ${i<count?'bg-blue-500':'bg-white bg-opacity-5'}`}>
          {i<count&&<span className="text-white text-xs">💧</span>}
        </button>
      ))}
    </div>
    <div className="flex gap-2 mt-3">
      <button onClick={()=>upd(count-1)} className="flex-1 bg-white bg-opacity-5 text-slate-300 py-2 rounded-xl font-bold text-lg">－</button>
      <button onClick={()=>upd(count+1)} className="flex-1 bg-blue-600 text-white py-2 rounded-xl font-bold text-lg">＋ Glass</button>
    </div>
  </div>;
}

// ─── WEIGHT CHART ─────────────────────────────────────────────
function WeightChart({progData,startDate}){
  const points=[];
  for(let w=1;w<=12;w++){
    const d=progData[`w${w}`]||{};
    const avg=d.weights?.length?(d.weights.reduce((a,b)=>a+b,0)/d.weights.length):null;
    points.push({w,avg});
  }
  const withData=points.filter(p=>p.avg);
  if(withData.length<2)return<div className="glass rounded-2xl p-6 text-center"><div className="text-slate-400 text-sm">Logg vekt i minst 2 uker for å se grafen</div></div>;
  const vals=withData.map(p=>p.avg);
  const minV=Math.min(...vals)-0.5, maxV=Math.max(ME.startWeight,...vals)+0.5;
  const range=maxV-minV||1;
  const W=320,H=100,pad=8;
  const x=w=>(w-1)/(11)*( W-pad*2)+pad;
  const y=v=>H-pad-(v-minV)/range*(H-pad*2);
  const pathData=withData.map((p,i)=>`${i===0?'M':'L'}${x(p.w-1).toFixed(1)},${y(p.avg).toFixed(1)}`).join(' ');
  const current=withData[withData.length-1];
  return<div className="glass rounded-2xl p-4">
    <div className="text-slate-300 font-bold mb-3">📈 Vekttrend – 12 uker</div>
    <div className="flex justify-between text-xs text-slate-500 mb-1">
      <span>Uke 1</span><span>Uke 12</span>
    </div>
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{height:100}}>
      {/* Grid lines */}
      {[0.25,0.5,0.75].map(f=><line key={f} x1={pad} x2={W-pad} y1={pad+(H-pad*2)*f} y2={pad+(H-pad*2)*f} stroke="#1e293b" strokeWidth="1"/>)}
      {/* Goal line */}
      <line x1={pad} x2={W-pad} y1={y(ME.goalWeight)} y2={y(ME.goalWeight)} stroke="#22c55e" strokeWidth="1" strokeDasharray="4,4"/>
      <text x={W-pad-2} y={y(ME.goalWeight)-3} fill="#22c55e" fontSize="8" textAnchor="end">mål</text>
      {/* Start line */}
      <line x1={pad} x2={W-pad} y1={y(ME.startWeight)} y2={y(ME.startWeight)} stroke="#64748b" strokeWidth="1" strokeDasharray="2,2"/>
      {/* Path */}
      <path d={pathData} fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {/* Dots */}
      {withData.map((p,i)=><circle key={i} cx={x(p.w-1)} cy={y(p.avg)} r="3.5" fill="#3b82f6" stroke="#060c18" strokeWidth="1.5"/>)}
      {/* Current dot highlight */}
      {current&&<circle cx={x(current.w-1)} cy={y(current.avg)} r="5" fill="#60a5fa" stroke="#060c18" strokeWidth="2"/>}
    </svg>
    <div className="flex justify-between text-xs mt-2">
      <div><span className="text-slate-500">Start: </span><span className="text-white font-bold">{ME.startWeight}kg</span></div>
      {current&&<div><span className="text-slate-500">Nå: </span><span className="text-blue-400 font-bold">{current.avg.toFixed(1)}kg</span></div>}
      <div><span className="text-slate-500">Mål: </span><span className="text-green-400 font-bold">{ME.goalWeight}kg</span></div>
    </div>
    {current&&(current.avg<ME.startWeight)&&<div className="mt-2 text-center text-green-400 text-sm font-bold">↓ {(ME.startWeight-current.avg).toFixed(1)}kg ned fra start 🎉</div>}
  </div>;
}

  const energy=ld('fc_energy',{})[date]||0;

  const totalSets=workout?.exercises.reduce((a,e)=>a+e.sets,0)||0;

  return<div className="fixed inset-0 z-50 flex flex-col su" style={{background:'#060c18'}}>
    {/* Header */}

      <div className="flex items-center justify-between mb-3">
        <button onClick={onClose} className="bg-white bg-opacity-20 rounded-xl px-3 py-1.5 text-sm font-medium">← Tilbake</button>
        <button onClick={()=>onEditSession(session)} className="bg-white bg-opacity-20 rounded-xl px-3 py-1.5 text-sm font-bold">✏️ Rediger økt</button>
      </div>
      <div className="text-sm opacity-75 capitalize">{dateLabel}</div>
      <div className="text-2xl font-black mt-0.5">{session.workoutTitle||workout?.title||session.workoutId}</div>
      <div className="text-white text-opacity-70 text-sm mt-1">{doneSets}/{totalSets} sett fullført</div>
    </div>
    <div className="flex-1 overflow-y-auto px-4 pt-4 space-y-4 pb-10">
      {/* Quick stats */}
      <div className="grid grid-cols-4 gap-2">
        <div className="glass rounded-2xl p-3 text-center">
          <div className={`font-black text-base ${totalP>=ME.targetProtein?'text-green-400':'text-white'}`}>{totalP}g</div>
          <div className="text-slate-500 text-xs">Protein</div>
        </div>
        <div className="glass rounded-2xl p-3 text-center">
          <div className="text-white font-black text-base">{totalK||'—'}</div>
          <div className="text-slate-500 text-xs">Kcal</div>
        </div>
        <div className="glass rounded-2xl p-3 text-center">
          <div className="text-white font-black text-base">{water}/8</div>
          <div className="text-slate-500 text-xs">Vann</div>
        </div>
        <div className="glass rounded-2xl p-3 text-center">
          <div className="text-base">{energy?energyLabels[energy].split(' ')[0]:'—'}</div>
          <div className="text-slate-500 text-xs">{energy?energyLabels[energy].split(' ')[1]:'Energi'}</div>
        </div>
      </div>
      {/* Workout sets */}
      {workout&&<div>
        <div className="text-slate-400 text-xs font-bold uppercase tracking-wide mb-2 px-1">💪 Treningsøkt</div>
        <div className="glass rounded-2xl overflow-hidden">
          {workout.exercises.map((ex,i)=>{
            const exSets=session.log?.[ex.id]||[];
            const logged=exSets.filter(s=>s.done&&(s.w||s.r));
            const allDone=logged.length===ex.sets;
            const skipped=logged.length===0;
            return<div key={ex.id} className="px-4 py-3 border-b border-white border-opacity-5 last:border-0">
              <div className="flex justify-between items-start mb-1">

// ─── WEEKLY RAPPORT ───────────────────────────────────────────
function WeeklyRapport({week,startDate}){
  if(!week||!startDate)return null;
  const prog=ld('fc_progress',{});
  const sessions=ld('fc_sessions',[]);
  const foodLog=ld('fc_food_log',{});
  // This week's dates
  const start=new Date(startDate);start.setDate(start.getDate()+(week-1)*7);
  const end=new Date(start);end.setDate(end.getDate()+7);
  // Sessions this week
  const weekSess=sessions.filter(s=>new Date(s.date)>=start&&new Date(s.date)<end);
  // Avg protein this week
  const days=[];for(let i=0;i<7;i++){const d=new Date(start);d.setDate(d.getDate()+i);days.push(d.toISOString().slice(0,10));}
  const dayProteins=days.map(d=>(foodLog[d]||[]).reduce((a,f)=>a+(f.protein||0),0));
  const avgProtein=dayProteins.some(p=>p>0)?Math.round(dayProteins.filter(p=>p>0).reduce((a,b)=>a+b,0)/dayProteins.filter(p=>p>0).length):null;
  // Weight this week
  const wData=prog[`w${week}`]||{};
  const avgW=wData.weights?.length?(wData.weights.reduce((a,b)=>a+b,0)/wData.weights.length).toFixed(1):null;
  // Prev week weight
  const prevW=prog[`w${week-1}`];
  const prevAvg=prevW?.weights?.length?(prevW.weights.reduce((a,b)=>a+b,0)/prevW.weights.length).toFixed(1):null;
  const wDiff=avgW&&prevAvg?(parseFloat(avgW)-parseFloat(prevAvg)).toFixed(1):null;
  const phase=getPhase(week);
  // Next week focus
  const nextPhase=getPhase(week+1);
  const tips=[];
  if(weekSess.length<3)tips.push(`Prøv å fullføre ${3-weekSess.length} økt${weekSess.length===2?'':'er'} til`);
  if(avgProtein&&avgProtein<ME.targetProtein-10)tips.push(`Øk protein – du lå på ~${avgProtein}g, mål er ${ME.targetProtein}g`);
  if(wDiff&&parseFloat(wDiff)>0.5)tips.push('Vekten gikk opp – reduser kalorier litt neste uke');
  if(wDiff&&parseFloat(wDiff)<-0.5)tips.push('Fint vektnedgang! Hold kursen neste uke');
  if(!wData.waist)tips.push('Husk å måle midje mandag morgen');
  if((wData.sleep||0)<5)tips.push('Prioriter mer søvn – kritisk for resultater');
  if(tips.length===0)tips.push('Bra uke! Hold trykket oppe neste uke 💪');
  return<div className="glass rounded-2xl overflow-hidden mb-4">
    <div className="px-4 py-3 border-b border-white border-opacity-5" style={{background:`${phase?.color}22`}}>
      <div className="text-white font-black">📋 Ukesrapport – Uke {week}</div>
      <div className="text-slate-400 text-xs">{phase?.name}</div>
    </div>
    <div className="px-4 py-3 grid grid-cols-3 gap-3 border-b border-white border-opacity-5">
      <div className="text-center">
        <div className={`text-2xl font-black ${weekSess.length>=3?'text-green-400':'text-yellow-400'}`}>{weekSess.length}/3</div>
        <div className="text-slate-400 text-xs">Økter</div>
      </div>
      <div className="text-center">
        <div className={`text-2xl font-black ${avgProtein&&avgProtein>=ME.targetProtein-10?'text-green-400':'text-yellow-400'}`}>{avgProtein||'—'}g</div>
        <div className="text-slate-400 text-xs">Snitt protein</div>
      </div>
      <div className="text-center">
        <div className={`text-2xl font-black ${wDiff&&parseFloat(wDiff)<0?'text-green-400':'text-slate-300'}`}>{avgW?`${avgW}kg`:'—'}</div>
        {wDiff&&<div className={`text-xs font-bold ${parseFloat(wDiff)<0?'text-green-400':'text-red-400'}`}>{parseFloat(wDiff)>0?'+':''}{wDiff}kg</div>}
        <div className="text-slate-400 text-xs">Snitt vekt</div>
      </div>
    </div>
    <div className="px-4 py-3">
      <div className="text-slate-300 text-xs font-bold mb-2">🎯 Fokus neste uke</div>
      <div className="space-y-1.5">
        {tips.map((t,i)=><div key={i} className="flex items-start gap-2 text-sm text-slate-300"><span className="text-blue-400 mt-0.5">→</span>{t}</div>)}
      </div>
    </div>
  </div>;
}

// ─── TODAY SCREEN ─────────────────────────────────────────────
function TodayScreen({startDate,onGoWorkout,onGoFood}){
  const week=getWeekNum(startDate);
  const phase=getPhase(week);
  const sessions=ld('fc_sessions',[]);
  const foodLog=ld('fc_food_log',{});
  const todayFood=foodLog[todayStr()]||[];
  const totalP=todayFood.reduce((a,f)=>a+(f.protein||0),0);
  const totalK=todayFood.reduce((a,f)=>a+(f.kcal||0),0);
  const dow=new Date().getDay();
  const hour=new Date().getHours();
  const todayPlan=WEEK_SCHEDULE[dow];
  const isTrain=todayPlan?.type==='workout';
  const kcalTarget=isTrain?ME.kcalTrain:ME.kcalRest;
  const prog=ld('fc_progress',{});
  const weekKey=`w${week}`;
  const thisWeek=prog[weekKey]||{};
  const weights=thisWeek.weights||[];
  const avgWeight=weights.length?Math.round((weights.reduce((a,b)=>a+b,0)/weights.length)*10)/10:null;
  const weekSessions=(()=>{
    if(!startDate||!week)return[];
    const start=new Date(startDate);start.setDate(start.getDate()+(week-1)*7);
    const end=new Date(start);end.setDate(end.getDate()+7);
    return sessions.filter(s=>new Date(s.date)>=start&&new Date(s.date)<end);
  })();
  const todaySteps=parseInt(thisWeek.steps)||0;
  const[stepEdit,setStepEdit]=useState(false);
  const[stepInput,setStepInput]=useState('');
  const saveSteps=v=>{if(!v)return;const n={...prog,[weekKey]:{...thisWeek,steps:v}};sv('fc_progress',n);setStepEdit(false);setStepInput('');};
  const dayName=new Date().toLocaleDateString('no-NO',{weekday:'long',day:'numeric',month:'long'});
  const run=getRunning(week);
  const runTip={1:run?.mon,3:run?.wed,6:run?.sat}[dow];

  // Streak
  let streak=0;
  if(startDate&&week){for(let w=week;w>=1;w--){
    const s=new Date(startDate);s.setDate(s.getDate()+(w-1)*7);
    const e=new Date(s);e.setDate(e.getDate()+7);
    if(sessions.filter(x=>new Date(x.date)>=s&&new Date(x.date)<e).length>=3)streak++;else break;
  }}

  // Water + energy
  const waterToday=ld('fc_water',{})[todayStr()]||0;
  const energyToday=ld('fc_energy',{})[todayStr()]||0;
  const todayWorkedOut=weekSessions.some(s=>s.date.slice(0,10)===todayStr());

  // Latest weight across all weeks
  let latestWeight=null;
  for(let w=week||12;w>=1;w--){const d=prog[`w${w}`];if(d?.weights?.length){latestWeight=+(d.weights.reduce((a,b)=>a+b,0)/d.weights.length).toFixed(1);break;}}
  const weightLost=latestWeight?+(ME.startWeight-latestWeight).toFixed(1):0;
  const weightToGo=latestWeight?+Math.max(latestWeight-ME.goalWeight,0).toFixed(1):+(ME.startWeight-ME.goalWeight).toFixed(1);
  const weightPct=latestWeight?Math.min(Math.max(weightLost/(ME.startWeight-ME.goalWeight)*100,0),100):0;
  const paceVals=[];for(let w=1;w<=(week||1);w++){const d=prog[`w${w}`];const avg=d?.weights?.length?+(d.weights.reduce((a,b)=>a+b,0)/d.weights.length).toFixed(1):null;if(avg)paceVals.push(avg);}
  const weeklyDelta=paceVals.length>=2?(paceVals[paceVals.length-1]-paceVals[0])/(paceVals.length-1):null;
  const weeksToGoalEst=weeklyDelta&&weeklyDelta<-0.05&&weightToGo>0?Math.ceil(weightToGo/Math.abs(weeklyDelta)):null;

  // Program progress
  const programPct=week?Math.min((week-1)/12*100,100):0;
  const weeksLeft=week?Math.max(12-week,0):12;

  // Daily score (0–100)
  const scoreItems=[
    {l:'Protein',done:totalP>=ME.targetProtein,p:totalP/ME.targetProtein,pts:30},
    {l:'Steg',done:todaySteps>=ME.stepGoal,p:todaySteps/ME.stepGoal,pts:20},
    {l:'Vann',done:waterToday>=8,p:waterToday/8,pts:15},
    {l:'Trening',done:!isTrain||todayWorkedOut,p:todayWorkedOut||!isTrain?1:0,pts:isTrain?25:0},
    {l:'Energi',done:energyToday>0,p:energyToday>0?1:0,pts:10},
  ];
  const maxPts=scoreItems.reduce((a,s)=>a+s.pts,0);
  const earnedPts=scoreItems.reduce((a,s)=>a+(s.done?s.pts:Math.min(s.p,1)*s.pts),0);
  const score=Math.round(earnedPts/maxPts*100);
  const scoreLabel=score>=90?'Perfekt dag! 🔥':score>=70?'Solid dag 💪':score>=50?'Halvveis 🙂':score>=25?'Kom i gang 📈':'Start dagen ☀️';
  const scoreColor=score>=70?'#22c55e':score>=40?'#f59e0b':'#ef4444';

  // Smart reminders (context-aware)
  const daysSinceLast=sessions.length?Math.floor((Date.now()-new Date([...sessions].reverse()[0]?.date||Date.now()))/86400000):99;
  const reminders=[];
  if(isTrain&&!todayWorkedOut) reminders.push({icon:'🏋️',text:todayPlan.label+' — trykk for å starte',color:'text-blue-300',bold:true});
  if(daysSinceLast>=4&&!todayWorkedOut) reminders.push({icon:'⚠️',text:`${daysSinceLast} dager siden siste økt — kom tilbake!`,color:'text-yellow-400',bold:true});
  if(todayWorkedOut) reminders.push({icon:'✅',text:'Økt fullført i dag — bra jobbet!',color:'text-green-400',bold:false});
  if(todayFood.length===0&&hour>=8) reminders.push({icon:'🥗',text:'Ikke logget mat enda — start med frokost',color:'text-slate-300',bold:false});
  if(totalP<ME.targetProtein*0.5&&hour>12&&todayFood.length>0) reminders.push({icon:'💪',text:`Protein lav: ${totalP}g — mangler ${ME.targetProtein-totalP}g til`,color:'text-yellow-400',bold:false});
  if(!weights.length) reminders.push({icon:'⚖️',text:'Ikke logget vekt denne uka — vei deg i morgen tidlig',color:'text-slate-400',bold:false});
  if(waterToday<4&&hour>10) reminders.push({icon:'💧',text:`Drikk mer vann (${waterToday}/8 glass i dag)`,color:'text-blue-300',bold:false});
  if(dow===1) reminders.push({icon:'📏',text:'Mandag: mål midje rundt navlen (morgen)',color:'text-purple-400',bold:false});
  if(week&&week%2===0) reminders.push({icon:'📸',text:`Uke ${week}: ta fremgangsbilde (front, side, bak)`,color:'text-pink-400',bold:false});
  if(totalP>=ME.targetProtein) reminders.push({icon:'🎯',text:'Proteinmål nådd i dag!',color:'text-green-400',bold:false});

  return<div className="min-h-screen safe" style={{background:'#060c18'}}>
    {/* Header */}
    <div className="px-4 pt-12 pb-4" style={{background:'linear-gradient(180deg,#0d1f3c 0%,#060c18 100%)'}}>
      <div className="flex justify-between items-start mb-3">
        <div>
          <div className="text-slate-300 text-xs font-medium capitalize">{dayName}</div>
          <h1 className="text-xl font-black text-white">Hei, {ME.name} 👋</h1>
        </div>
        <div className="flex gap-2 items-start">
          {week&&<div className="glass rounded-xl px-3 py-1.5 text-right">
            <div className="text-white font-black text-sm">Uke {week}/12</div>
            <div className="text-slate-400 text-xs">{phase?.name}</div>
          </div>}
          {streak>=2&&<div className="rounded-xl px-2.5 py-1.5 text-center" style={{background:'rgba(120,53,15,0.4)',border:'1px solid rgba(180,83,9,0.4)'}}>
            <div className="text-orange-400 font-black text-sm">{streak}🔥</div>
            <div className="text-orange-300 text-xs">streak</div>
          </div>}
        </div>
      </div>

      {/* Daily Score */}
      <div className="glass rounded-2xl p-4 mb-3">
        <div className="flex items-center justify-between mb-2">
          <div>
            <div className="text-white font-black text-3xl">{score}<span className="text-base text-slate-400 font-normal">%</span></div>
            <div className="font-bold text-sm mt-0.5" style={{color:scoreColor}}>{scoreLabel}</div>
          </div>
          <div className="grid grid-cols-3 gap-x-3 gap-y-1">
            {scoreItems.filter(s=>s.pts>0).map(s=>(
              <div key={s.l} className={`text-xs text-right ${s.done?'text-green-400':'text-slate-500'}`}>
                {s.done?'✓':Math.round(Math.min(s.p,1)*100)+'%'} {s.l}
              </div>
            ))}
          </div>
        </div>
        <div className="h-2 score-track rounded-full overflow-hidden">
          <div className="h-full rounded-full transition-all duration-700" style={{width:`${score}%`,background:`linear-gradient(90deg,${scoreColor},${scoreColor}bb)`}}/>
        </div>
      </div>

      {/* Rings */}
      <div className="flex justify-around py-1">
        <Ring value={totalP} max={ME.targetProtein} color="#22c55e" size={80} label={`${totalP}g`} sub="protein"/>
        <Ring value={totalK} max={kcalTarget} color="#3b82f6" size={80} label={`${totalK}`} sub="kcal"/>
        <Ring value={weekSessions.length} max={3} color="#a855f7" size={80} label={`${weekSessions.length}/3`} sub="økter"/>
        <button onClick={()=>setStepEdit(true)} className="flex flex-col items-center">
          <Ring value={todaySteps} max={ME.stepGoal} color="#f59e0b" size={80} label={todaySteps>0?`${Math.round(todaySteps/1000*10)/10}k`:'+'} sub="steg"/>
        </button>
      </div>
      {stepEdit&&<div className="glass rounded-2xl p-3 flex gap-2 items-center su mt-2">
        <span className="text-xl">👟</span>
        <input type="number" inputMode="numeric" placeholder="Antall steg" value={stepInput} onChange={e=>setStepInput(e.target.value)}
          className="flex-1 bg-slate-700 border border-slate-600 text-white rounded-xl p-2.5 text-sm font-bold"/>
        <button onClick={()=>saveSteps(stepInput)} className="bg-amber-500 text-white px-4 py-2.5 rounded-xl font-bold text-sm">Lagre</button>
        <button onClick={()=>setStepEdit(false)} className="text-slate-500 text-xl px-1">✕</button>
      </div>}
    </div>

    <div className="px-4 space-y-3">

      {/* Progress cards: program + weight */}
      <div className="grid grid-cols-2 gap-3">
        <div className="glass rounded-2xl p-3">
          <div className="text-slate-400 text-xs mb-1">🗓 Program</div>
          <div className="text-white font-black text-lg">{week?`Uke ${week}/12`:'—'}</div>
          <div className="h-1.5 rounded-full mt-2 mb-1 overflow-hidden" style={{background:'rgba(255,255,255,0.07)'}}>
            <div className="h-full rounded-full" style={{width:`${programPct}%`,background:'linear-gradient(90deg,#a855f7,#ec4899)'}}/>
          </div>
          <div className="text-slate-500 text-xs">{weeksLeft} uker igjen</div>
        </div>
        <div className="glass rounded-2xl p-3">
          <div className="text-slate-400 text-xs mb-1">⚖️ Mål-fremgang</div>
          <div className="text-white font-black text-lg">{latestWeight?`${latestWeight} kg`:'—'}</div>
          <div className="h-1.5 rounded-full mt-2 mb-1 overflow-hidden" style={{background:'rgba(255,255,255,0.07)'}}>
            <div className="h-full rounded-full" style={{width:`${weightPct}%`,background:'linear-gradient(90deg,#22c55e,#84cc16)'}}/>
          </div>
          <div className="text-slate-500 text-xs">{weightToGo>0?`${weightToGo} kg til mål`:'🎯 Mål nådd!'}</div>
          {weeksToGoalEst&&weeksToGoalEst<30&&<div className="text-green-400 text-xs font-bold">🏁 ~{weeksToGoalEst} uker til mål</div>}
        </div>
      </div>

      {/* Body stats mini */}
      <div className="grid grid-cols-3 gap-3">
        <div className="glass rounded-2xl p-3 text-center">
          <div className="text-slate-400 text-xs mb-1">⚖️ Vekt</div>
          <div className="text-white font-black">{avgWeight?`${avgWeight}kg`:'—'}</div>
          <div className="text-slate-500 text-xs">start {ME.startWeight}</div>
        </div>
        <div className="glass rounded-2xl p-3 text-center">
          <div className="text-slate-400 text-xs mb-1">📏 Midje</div>
          <div className="text-white font-black">{thisWeek.waist?`${thisWeek.waist}cm`:'—'}</div>
        </div>
        <div className="glass rounded-2xl p-3 text-center">
          <div className="text-slate-400 text-xs mb-1">🦾 Arm</div>
          <div className="text-white font-black">{thisWeek.arm?`${thisWeek.arm}cm`:'—'}</div>
        </div>
      </div>

      {/* Phase banner */}
      {phase&&<div className="rounded-2xl p-3 flex items-center gap-3" style={{background:phase.color+'22',border:`1px solid ${phase.color}44`}}>
        <span className="text-xl">{phase.emoji}</span>
        <div><div className="text-white font-bold text-sm">{phase.name} · {phase.rpe}</div><div className="text-slate-300 text-xs">{phase.tip}</div></div>
      </div>}

      {/* Today's plan */}
      {todayPlan&&<div className={`rounded-2xl p-4 ${isTrain?'cursor-pointer':''}`}
        style={{background:isTrain?'linear-gradient(135deg,#1e40af22,#7c3aed22)':'#1e293b',border:`1px solid ${isTrain?'#3b82f644':'#33415544'}`}}
        onClick={()=>isTrain&&todayPlan.id&&onGoWorkout(todayPlan.id)}>
        <div className="flex items-center justify-between">
          <div>
            <div className="text-slate-400 text-xs font-medium uppercase tracking-wide">I dag</div>
            <div className="text-white font-bold mt-0.5">{todayPlan.label}</div>
            <div className="text-slate-400 text-sm">{todayPlan.sub}</div>
          </div>
          {isTrain&&<div className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm">Start →</div>}
        </div>
      </div>}

      {/* Running tip */}
      {week&&runTip&&<div className="bg-teal-900 bg-opacity-40 border border-teal-700 border-opacity-40 rounded-2xl p-3">
        <div className="text-teal-400 text-xs font-bold mb-0.5">🏃 Løp i dag (uke {week})</div>
        <div className="text-white text-sm">{runTip}</div>
      </div>}

      {/* Smart reminders */}
      {reminders.length>0&&<div className="glass rounded-2xl p-4">
        <div className="text-slate-300 text-sm font-bold mb-2">📌 Viktig nå</div>
        <div className="space-y-2">
          {reminders.map((r,i)=>(
            <div key={i} className={`flex items-start gap-2 text-sm ${r.color}`}>
              <span className="flex-shrink-0">{r.icon}</span>
              <span className={r.bold?'font-bold':''}>{r.text}</span>
            </div>
          ))}
        </div>
      </div>}

      {/* Food quick action */}
      <button onClick={onGoFood} className="w-full glass rounded-2xl p-4 flex items-center justify-between">
        <div className="text-left">
          <div className="text-slate-400 text-xs">Protein i dag</div>
          <div className="text-white font-bold">{totalP}g / {ME.targetProtein}g</div>
          <div className="h-1.5 bg-slate-700 rounded-full mt-2 w-44 overflow-hidden"><div className="h-full bg-green-500 rounded-full" style={{width:`${Math.min(totalP/ME.targetProtein*100,100)}%`}}/></div>
        </div>
        <div className="text-slate-400 text-sm">+ Logg mat →</div>
      </button>

      {/* Water + Energy */}
      <WaterTracker/>
      <EnergyLog/>

      {/* Weekly rapport */}
      {week&&<WeeklyRapport week={week} startDate={startDate}/>}

    </div>
  </div>;
}

function ShoppingList(){
  const[checked,setChecked]=useState(()=>ld('fc_shopping',{}));
  const toggle=key=>{const n={...checked,[key]:!checked[key]};setChecked(n);sv('fc_shopping',n);};
  const resetAll=()=>{setChecked({});sv('fc_shopping',{});};
  const totalItems=SHOPPING_LIST.reduce((a,c)=>a+c.items.length,0);
  const checkedCount=Object.values(checked).filter(Boolean).length;
  return<div className="space-y-3">
    <div className="flex justify-between items-center">
      <div className="text-slate-300 font-bold">🛒 Handleliste uke</div>
      <div className="flex items-center gap-3">
        <span className={`text-sm font-bold ${checkedCount===totalItems?'text-green-400':'text-slate-400'}`}>{checkedCount}/{totalItems}</span>
        <button onClick={resetAll} className="text-xs bg-slate-700 text-slate-400 px-3 py-1.5 rounded-lg font-bold">↺ Reset</button>
      </div>
    </div>
    {checkedCount===totalItems&&totalItems>0&&<div className="bg-green-900 bg-opacity-30 border border-green-700 border-opacity-40 rounded-2xl p-3 text-center text-green-400 font-bold text-sm pop">✅ Alt handlet! Klar for uka.</div>}
    {SHOPPING_LIST.map(cat=>(
      <div key={cat.cat} className="bg-slate-800 rounded-2xl overflow-hidden">
        <div className="px-4 py-2.5 border-b border-slate-700 text-slate-300 font-bold text-sm">{cat.cat}</div>
        {cat.items.map(item=>{
          const key=`${cat.cat}-${item}`;
          const done=checked[key];
          return<button key={item} onClick={()=>toggle(key)} className={`w-full flex items-center gap-3 px-4 py-3 border-b border-slate-700 last:border-0 text-left transition-all ${done?'bg-slate-800':'bg-slate-800'}`}>
            <div className={`w-5 h-5 rounded-full flex-shrink-0 border-2 flex items-center justify-center transition-all ${done?'bg-green-500 border-green-500':'border-slate-600'}`}>
              {done&&<span className="text-white text-xs font-black">✓</span>}
            </div>
            <span className={`text-sm ${done?'line-through text-slate-500':'text-white'}`}>{item}</span>
          </button>;
        })}
      </div>
    ))}
    <div className="bg-slate-800 rounded-2xl p-4">
      <div className="text-slate-300 font-bold mb-2 text-sm">🍱 Meal prep søndag (30-45 min)</div>
      <div className="space-y-1.5 text-slate-400 text-sm">
        {['Lag 2-3 porsjoner kylling/karbonadedeig og ris/potet',
          'Kutt grønnsaker eller kjøp ferdig frossen miks',
          'Ha skyr/cottage cheese klar til kveldene',
          'Legg proteinpulver og shaker synlig – enklere enn baguette'].map((t,i)=>(
          <div key={i} className="flex gap-2"><span className="text-green-400">•</span>{t}</div>
        ))}
      </div>
    </div>
  </div>;
}

          <div className="text-blue-400 font-black mb-2">💡 Din kostplan – tre regler</div>
          <div className="space-y-2 text-sm text-slate-300">
            <div className="flex gap-2"><span className="text-blue-400 flex-shrink-0 font-bold">→</span><span>Du skal ikke spise perfekt. Du skal spise <span className="text-white font-bold">repeterbart</span>.</span></div>
            <div className="flex gap-2"><span className="text-yellow-400 flex-shrink-0 font-bold">→</span><span><span className="text-white font-bold">Etter kl. 21:</span> protein + lett mat. Ikke baguette mandag–torsdag.</span></div>
            <div className="flex gap-2"><span className="text-green-400 flex-shrink-0 font-bold">→</span><span><span className="text-white font-bold">Helg:</span> planlagt kos er lov. Ikke la fredag kveld bli fredag–søndag.</span></div>
          </div>
        </div>
        <div className="bg-slate-800 rounded-2xl p-4">
          <div className="text-slate-300 font-bold mb-3">🎯 Dine daglige mål</div>
          <div className="grid grid-cols-2 gap-3">
            {[['Protein','130-150g/dag'],['Treningsdag','2100-2200 kcal'],['Hviledag','1900-2000 kcal'],['Vektnedgang','0,3-0,5 kg/uke']].map(([l,v])=>(
              <div key={l} className="bg-slate-700 rounded-xl p-3"><div className="text-slate-400 text-xs">{l}</div><div className="text-white font-bold text-sm mt-0.5">{v}</div></div>
            ))}
          </div>
        </div>
        <div className="bg-slate-800 rounded-2xl p-4">
          <div className="text-slate-300 font-bold mb-2">🥩 Protein fordeling per dag</div>
          <div className="text-slate-500 text-xs mb-3">Fordel på 3-5 måltider, ikke alt på én gang</div>
          {[{meal:'Frokost',target:'30-40g',ex:'Skyr-bowl / egg-frokost'},
            {meal:'Lunsj',target:'35-45g',ex:'Kylling-bowl / tunfisk'},
            {meal:'Middag',target:'40-50g',ex:'Kylling / laks + grønnsaker'},
            {meal:'Kveld',target:'20-30g',ex:'Cottage cheese / shake'},
          ].map(r=>(
            <div key={r.meal} className="flex items-center justify-between py-2 border-b border-slate-700 last:border-0">
              <div><div className="text-white text-sm font-medium">{r.meal}</div><div className="text-slate-500 text-xs">{r.ex}</div></div>
              <div className="text-green-400 font-black text-sm flex-shrink-0 ml-3">{r.target}</div>
            </div>
          ))}
        </div>
        {[['🌅 Frokost','frokost'],['☀️ Lunsj','lunsj'],['🍽 Middag','middag'],['🌙 Kveld','kveld']].map(([label,key])=>(
          <div key={key} className="bg-slate-800 rounded-2xl overflow-hidden">
            <div className="px-4 py-3 border-b border-slate-700 text-slate-300 font-bold text-sm">{label}</div>
            {MEALS[key].map((m,i)=>(
              <div key={i} className="flex justify-between items-center px-4 py-2.5 border-b border-slate-700 last:border-0">
                <div><div className="text-white text-sm">{m.name}</div><div className="text-slate-500 text-xs">{m.desc}</div></div>
                <div className="text-right ml-2 flex-shrink-0"><div className="text-green-400 text-xs font-bold">{m.protein}g</div><div className="text-slate-500 text-xs">{m.kcal} kcal</div></div>
              </div>
            ))}
          </div>
        ))}
        <div className="bg-red-900 bg-opacity-30 border border-red-700 border-opacity-40 rounded-2xl p-4">
          <div className="text-red-400 font-bold mb-1">🚫 Viktigste matregel</div>
          <div className="text-slate-300 text-sm">Baguette sent på kvelden (etter kl. 21) må bort mesteparten av uka. Det er her magefettet vinner.</div>
        </div>
        <ShoppingList/>
      </>}
      {tab==='oppskrifter'&&<RecipesTab/>}
      {tab==='supp'&&<>
        <div className="bg-slate-800 rounded-2xl p-3 mb-1"><div className="text-slate-300 font-bold mb-1">✅ Anbefalt</div><div className="text-slate-500 text-xs">Dropp fat burners, testoboosters, BCAA og kompliserte pre-workout. Pre-workout sent på dagen ødelegger søvn.</div></div>
        {SUPPLEMENTS.map((s,i)=>(
          <div key={i} className="bg-slate-800 rounded-2xl p-4">
            <div className="flex justify-between items-start mb-1"><div className="text-white font-bold">{s.name}</div><span className="bg-slate-700 text-slate-300 text-xs px-2 py-1 rounded-lg">{s.dose}</span></div>
            <div className="text-blue-400 text-xs font-medium mb-1">⏰ {s.when}</div>
            <div className="text-slate-400 text-sm">{s.note}</div>
          </div>
        ))}
        <div className="bg-slate-800 rounded-2xl overflow-hidden mb-4">
          <div className="px-4 py-3 border-b border-slate-700 text-slate-300 font-bold">💧 Morgenrutine</div>
          {[{when:'Standard',do:'500 ml vann når du står opp + kaffe hvis du vil'},
            {when:'Hvis du svetter mye',do:'500 ml vann + liten klype salt eller elektrolytt-tablett'},
            {when:'Hvis du får søtsug',do:'Vann + frokost med protein innen 1-2 timer'},
          ].map(r=>(
            <div key={r.when} className="px-4 py-3 border-b border-slate-700 last:border-0">
              <div className="text-blue-400 text-xs font-bold mb-0.5">{r.when}</div>
              <div className="text-slate-300 text-sm">{r.do}</div>
            </div>
          ))}
          <div className="px-4 py-3 bg-slate-700 bg-opacity-40">
            <div className="text-slate-400 text-xs">💡 Vann med sitron, salt eller eplecidereddik er greit for smak, men setter ikke i gang fettforbrenning på noen magisk måte. Vann er nok.</div>
          </div>
        </div>
      </>}
    </div>
  </div>;
}

// ─── BOTTOM NAV ───────────────────────────────────────────────
function BottomNav({active,onChange}){
  const tabs=[['today','🏠','I dag'],['workout','💪','Trening'],['food','🥗','Mat'],['progress','📊','Fremgang'],['plan','📋','Plan']];
  return<nav className="bnav">
    <div className="flex">
      {tabs.map(([id,icon,label])=>(
        <button key={id} onClick={()=>onChange(id)} className={`flex-1 flex flex-col items-center py-3 gap-0.5 transition-all ${active===id?'':'text-slate-500'}`}>
          <span className={`text-xl leading-none transition-transform ${active===id?'scale-110':''}`}>{icon}</span>
          {active===id
            ?<span className="text-xs font-bold grad-text">{label}</span>
            :<span className="text-xs font-medium">{label}</span>}
          {active===id&&<span className="w-1 h-1 rounded-full bg-blue-400 -mt-0.5"/>}
        </button>
      ))}
    </div>
  </nav>;
}

// ─── APP ──────────────────────────────────────────────────────
function App(){
  const[startDate,setStartDate]=useState(()=>ld('fc_start',null));
  const[tab,setTab]=useState('today');
  const[workoutId,setWorkoutId]=useState(null);
  const[editSession,setEditSession]=useState(null);
  if(!startDate)return<SetupScreen onDone={d=>setStartDate(d)}/>;
  return<div>
    {tab==='today'&&<TodayScreen startDate={startDate} onGoWorkout={id=>{setWorkoutId(id);setTab('workout');}} onGoFood={()=>setTab('food')}/>}
    {tab==='workout'&&<WorkoutScreen initialId={workoutId} initialEditSession={editSession}/>}
    {tab==='food'&&<FoodScreen/>}
    {tab==='progress'&&<ProgressScreen startDate={startDate} onEditSession={s=>{setEditSession(s);setWorkoutId(null);setTab('workout');}}/>}
    {tab==='plan'&&<PlanScreen startDate={startDate}/>}
    <BottomNav active={tab} onChange={t=>{if(t!=='workout'){setWorkoutId(null);setEditSession(null);}setTab(t);}}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

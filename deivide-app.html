// STORAGE UTILS

const load=(k,def)=>{try{return JSON.parse(localStorage.getItem(k))??def}catch{return def}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

function getWeekNum(startDate){
  if(!startDate)return null;
  const diff=Date.now()-new Date(startDate).getTime();
  const w=Math.floor(diff/604800000)+1;
  return Math.min(Math.max(w,1),12);
}

function getPhase(week){
  if(!week)return null;
  return PHASES.find(p=>week>=p.range[0]&&week<=p.range[1]);
}

function getRunningForWeek(week){
  if(!week)return null;
  return RUNNING.find(r=>week>=r.w[0]&&week<=r.w[1]);
}

function todayStr(){return new Date().toISOString().slice(0,10)}

// ═══════════════════════════════════════════════════════════════
// RING COMPONENT
// ═══════════════════════════════════════════════════════════════

function Ring({value,max,color,size=80,stroke=8,label,sub}){
  const r=(size-stroke*2)/2,c=2*Math.PI*r,pct=Math.min(value/max,1);
  const offset=c-(pct*c);
  return(
    <div className="flex flex-col items-center">
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle className="ring-bg" cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={stroke}/>
        <circle className="ring-fg" cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={stroke}
          stroke={color} strokeDasharray={c} strokeDashoffset={offset}/>
      </svg>
      <div className="text-center -mt-1">
        <div className="text-white font-black text-sm">{label}</div>
        {sub&&<div className="text-slate-400 text-xs">{sub}</div>}
      </div>
    </div>
  );
}

    if(!startDate||!week)return false;
    const start=new Date(startDate);
    start.setDate(start.getDate()+(week-1)*7);
    const end=new Date(start); end.setDate(end.getDate()+7);
    return new Date(s.date)>=start&&new Date(s.date)<end;
  });

  const dayName=new Date().toLocaleDateString('no-NO',{weekday:'long',day:'numeric',month:'long'});

            <h1 className="text-xl font-black text-white">Hei, {ME.name} 👋</h1>

            <div className="text-white font-black text-sm">Uke {week}/12</div>
            <div className="text-slate-400 text-xs">{phase?.name}</div>
          </div>}
        </div>
        {/* Phase banner */}
        {phase&&<div className="rounded-2xl p-3 mb-4 flex items-center gap-3" style={{background:phase.color+'22',border:`1px solid ${phase.color}44`}}>
          <span className="text-2xl">{phase.emoji}</span>
          <div>
            <div className="text-white font-bold text-sm">{phase.name} · {phase.rpe}</div>

          <Ring value={todayKcal} max={kcalTarget} color="#3b82f6" size={88} label={`${todayKcal}`} sub="kcal"/>
          <Ring value={weekSessions.length} max={3} color="#a855f7" size={88} label={`${weekSessions.length}/3`} sub="økter"/>

      </div>

      <div className="px-4 space-y-3">
        {/* Today's plan */}
        {todayPlan&&<div className={`rounded-2xl p-4 su ${isTraining?'cursor-pointer':''}`}

              <div className="text-white font-bold mt-0.5">{todayPlan.label}</div>

// REST TIMER
// ═══════════════════════════════════════════════════════════════

function RestTimer({onClose}){
  const[secs,setSecs]=useState(90);
  const[total,setTotal]=useState(90);
  const[on,setOn]=useState(true);
  const ref=useRef();
  useEffect(()=>{
    if(on){ref.current=setInterval(()=>setSecs(s=>{
      if(s<=1){clearInterval(ref.current);setOn(false);if('vibrate'in navigator)navigator.vibrate([200,100,200]);return 0;}
      return s-1;
    }),1000);}
    else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[on]);
  const preset=t=>{clearInterval(ref.current);setSecs(t);setTotal(t);setOn(true);};
  const pct=total>0?secs/total*100:0;
  const bar=pct>50?'#3b82f6':pct>20?'#f59e0b':'#ef4444';
  const m=String(Math.floor(secs/60)).padStart(2,'0'),s2=String(secs%60).padStart(2,'0');
  return(
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{background:'rgba(0,0,0,0.7)'}}>
      <div className="bg-slate-900 border border-slate-700 rounded-t-3xl w-full max-w-md p-6 pb-8 su">
        <div className="flex justify-between items-center mb-4">
          <span className="font-bold text-white text-lg">⏱ Hviletimer</span>
          <button onClick={onClose} className="text-slate-400 text-2xl">✕</button>
        </div>
        <div className={`text-6xl font-black text-center mb-2 ${secs===0?'text-green-400':'text-blue-400'}`} style={{fontVariantNumeric:'tabular-nums'}}>
          {secs===0?'✅ GÅ!':`${m}:${s2}`}
        </div>
        <div className="h-2 bg-slate-800 rounded-full mb-5 overflow-hidden">
          <div className="h-full rounded-full transition-all duration-1000" style={{width:`${pct}%`,background:bar}}/>
        </div>
        <div className="flex gap-2 justify-center mb-4">
          {[60,90,120,180].map(t=>(
            <button key={t} onClick={()=>preset(t)}
              className={`px-3 py-2 rounded-xl text-sm font-bold border-2 transition-all ${total===t?'border-blue-500 bg-blue-500 bg-opacity-20 text-blue-400':'border-slate-700 text-slate-400'}`}>
              {t===60?'1min':t===90?'90s':t===120?'2min':'3min'}
            </button>
          ))}
        </div>
        <div className="flex gap-3">
          <button onClick={()=>{clearInterval(ref.current);setOn(o=>!o);}}
            className="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold">
            {on?'⏸ Pause':'▶ Start'}
          </button>
          <button onClick={()=>{clearInterval(ref.current);setSecs(total);setOn(true);}}
            className="bg-slate-700 text-white px-5 py-3 rounded-2xl font-bold">↺</button>
        </div>
      </div>
    </div>
  );
}

function ActiveWorkout({workout,onBack,onDone}){
  const[idx,setIdx]=useState(0);
  const[log,setLog]=useState(()=>{
    const o={};
    workout.exercises.forEach(e=>{o[e.id]=Array.from({length:e.sets},()=>({w:'',r:'',done:false}));});
    return o;
  });
  const[timer,setTimer]=useState(false);
  const[finish,setFinish]=useState(false);
  const ex=workout.exercises[idx];
  const sets=log[ex.id];
  const done=sets.filter(s=>s.done).length;
  const total=workout.exercises.length;
  const prog=(idx/total*100)+(done/ex.sets/total*100);
  const upd=(i,f,v)=>setLog(p=>({...p,[ex.id]:p[ex.id].map((s,j)=>j===i?{...s,[f]:v}:s)}));
  const toggle=i=>setLog(p=>{
    const upd=p[ex.id].map((s,j)=>j===i?{...s,done:!s.done}:s);
    if(!p[ex.id][i].done)setTimeout(()=>setTimer(true),300);
    return{...p,[ex.id]:upd};
  });
  const save2=()=>{
    const sess=load('fc_sessions',[]);
    sess.push({id:Date.now(),date:new Date().toISOString(),workoutId:workout.id,workoutTitle:workout.title,log:JSON.parse(JSON.stringify(log))});
    save('fc_sessions',sess);
    onDone();
  };
  return(
    <div className="min-h-screen flex flex-col" style={{background:'#0f172a'}}>
      <div className="text-white px-4 pt-4 pb-3" style={{background:`linear-gradient(135deg,${workout.from},${workout.to})`}}>
        <div className="flex items-center justify-between mb-2">
          <button onClick={()=>{if(confirm('Avbryte?'))onBack();}} className="bg-white bg-opacity-20 rounded-xl px-3 py-1.5 text-sm font-medium">← Avbryt</button>
          <div className="text-sm font-semibold opacity-90">{idx+1}/{total} øvelser</div>
          <button onClick={()=>setFinish(true)} className="bg-white bg-opacity-20 rounded-xl px-3 py-1.5 text-sm font-medium">Fullfør</button>
        </div>
        <div className="h-1.5 bg-white bg-opacity-20 rounded-full overflow-hidden">
          <div className="h-full bg-white rounded-full transition-all duration-500" style={{width:`${prog}%`}}/>
        </div>
      </div>
      <ExImg url={ex.img} name={ex.name}/>
      <div className="px-4 pt-4 pb-2 su" key={ex.id}>
        <div className="flex justify-between items-start mb-1">
          <div className="flex-1 pr-2">
            <h2 className="text-white font-black text-xl leading-tight">{ex.name}</h2>
            <p className="text-slate-500 text-xs">{ex.en}</p>
          </div>
          <div className="text-right flex-shrink-0">
            <div className="text-white font-black text-2xl">{ex.sets}×{ex.reps}</div>
            {ex.repsNote&&<div className="text-slate-400 text-xs">{ex.repsNote}</div>}
          </div>
        </div>
        <div className="flex flex-wrap gap-2 mt-2">
          <span className="bg-blue-900 bg-opacity-60 text-blue-300 text-xs font-bold px-3 py-1 rounded-full">🎯 {ex.focus}</span>
          <span className="bg-slate-800 text-slate-300 text-xs px-3 py-1 rounded-full">🔧 {ex.eq}</span>
        </div>
        <div className="bg-slate-800 bg-opacity-60 rounded-xl p-3 mt-2">
          <span className="text-slate-400 text-xs">💡 {ex.tip}</span>
        </div>
      </div>
      <div className="px-4 flex-1 overflow-y-auto pb-4">
        <div className="flex justify-between items-center mb-2">
          <span className="text-slate-400 text-sm font-bold">Sett ({done}/{ex.sets})</span>
          <button onClick={()=>setTimer(true)} className="text-xs bg-slate-800 text-blue-400 font-bold px-3 py-1.5 rounded-full">⏱ Hvile</button>
        </div>
        <div className="grid grid-cols-12 gap-2 mb-2 px-1">
          {['Sett','Kg','Reps','✓'].map((h,i)=><div key={i} className={`text-slate-500 text-xs text-center ${i===0?'col-span-2':i<3?'col-span-4':'col-span-2'}`}>{h}</div>)}
        </div>
        {sets.map((s,i)=>(
          <div key={i} className={`grid grid-cols-12 gap-2 mb-2 items-center px-1 py-2.5 rounded-xl ${s.done?'bg-green-900 bg-opacity-30':'bg-slate-800 bg-opacity-60'}`}>
            <div className={`col-span-2 text-center text-sm font-black ${s.done?'text-green-400':'text-slate-400'}`}>{i+1}</div>
            <input type="number" inputMode="decimal" placeholder="kg" value={s.w} onChange={e=>upd(i,'w',e.target.value)}
              className={`col-span-4 rounded-xl py-2 text-center text-sm font-bold w-full focus:outline-none ${s.done?'bg-green-900 bg-opacity-40 text-green-300 border border-green-700':'bg-slate-700 text-white border border-slate-600'}`}/>
            <input type={ex.reps==='hold'?'text':'number'} inputMode="numeric" placeholder={ex.reps==='hold'?'sek':'reps'} value={s.r} onChange={e=>upd(i,'r',e.target.value)}
              className={`col-span-4 rounded-xl py-2 text-center text-sm font-bold w-full focus:outline-none ${s.done?'bg-green-900 bg-opacity-40 text-green-300 border border-green-700':'bg-slate-700 text-white border border-slate-600'}`}/>
            <div className="col-span-2 flex justify-center">
              <button onClick={()=>toggle(i)} className={`w-9 h-9 rounded-full border-2 font-bold text-sm transition-all ${s.done?'bg-green-500 border-green-500 text-white':'border-slate-600 text-slate-600 hover:border-green-500'}`}>
                {s.done?'✓':''}
              </button>
            </div>
          </div>
        ))}
        <div className="flex gap-3 mt-4">
          {idx>0&&<button onClick={()=>setIdx(i=>i-1)} className="flex-1 bg-slate-800 border border-slate-700 text-slate-300 py-3.5 rounded-2xl font-bold text-sm">← Forrige</button>}
          {idx<total-1
            ?<button onClick={()=>setIdx(i=>i+1)} className="flex-1 text-white py-3.5 rounded-2xl font-bold text-sm" style={{background:`linear-gradient(135deg,${workout.from},${workout.to})`}}>Neste →</button>
            :<button onClick={()=>setFinish(true)} className="flex-1 bg-green-600 text-white py-3.5 rounded-2xl font-bold text-sm">🏆 Fullfør</button>}
        </div>
      </div>
      {timer&&<RestTimer onClose={()=>setTimer(false)}/>}
      {finish&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)'}}>
          <div className="bg-slate-900 border border-slate-700 rounded-3xl p-6 mx-4 w-full max-w-sm text-center su">
            <div className="text-5xl mb-3">🏆</div>
            <h3 className="text-xl font-black text-white mb-1">Økt fullført!</h3>
            <p className="text-slate-400 text-sm mb-5">Bra jobbet, {ME.name}! Lagre og se historikken.</p>
            <button onClick={save2} className="w-full bg-green-600 text-white py-3.5 rounded-2xl font-black text-lg mb-3">✅ Lagre økt</button>
            <button onClick={()=>setFinish(false)} className="w-full bg-slate-800 text-slate-300 py-3 rounded-2xl font-semibold">Fortsett trening</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProgressScreen({startDate}){
  const week=getWeekNum(startDate)||1;
  const[prog,setProg]=useState(()=>load('fc_progress',{}));
  const[activeWeek,setActiveWeek]=useState(week);
  const wk=`w${activeWeek}`;
  const data=prog[wk]||{weights:[],waist:'',sleep:0,note:''};
  const upd=obj=>{const n={...prog,[wk]:{...data,...obj}};setProg(n);save('fc_progress',n);};
  const addWeight=v=>{if(!v)return;const w=[...(data.weights||[]),parseFloat(v)].slice(-3);upd({weights:w});};
  const avgW=data.weights?.length?(data.weights.reduce((a,b)=>a+b,0)/data.weights.length).toFixed(1):null;
  const sessions=load('fc_sessions',[]);
  const weekSessions=wk=>{
    if(!startDate)return[];
    const wn=parseInt(wk.replace('w',''));
    const start=new Date(startDate);start.setDate(start.getDate()+(wn-1)*7);
    const end=new Date(start);end.setDate(end.getDate()+7);
    return sessions.filter(s=>new Date(s.date)>=start&&new Date(s.date)<end);
  };
  const[newW,setNewW]=useState('');
  return(
    <div className="min-h-screen safe-bottom" style={{background:'#0f172a'}}>
      <div className="px-4 pt-12 pb-4" style={{background:'linear-gradient(180deg,#1e1b4b 0%,#0f172a 100%)'}}>
        <h1 className="text-2xl font-black text-white">📊 Fremgang</h1>
        <p className="text-slate-400 text-sm">Start: {ME.startWeight} kg · Mål: ~{ME.goalWeight} kg</p>
      </div>
      <div className="px-4 space-y-4">
        {/* Week selector */}
        <div className="flex gap-1.5 overflow-x-auto pb-1">
          {Array.from({length:12},(_,i)=>i+1).map(w=>{
            const ws=weekSessions(`w${w}`);
            return(
              <button key={w} onClick={()=>setActiveWeek(w)}
                className={`flex-shrink-0 w-10 h-10 rounded-xl text-sm font-black transition-all relative ${w===activeWeek?'bg-purple-600 text-white':'bg-slate-800 text-slate-400'} ${w===week?'ring-2 ring-purple-400':''}`}>
                {w}
                {ws.length>0&&<div className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-green-500 rounded-full"/>}
              </button>
            );
          })}
        </div>
        <div className="text-slate-400 text-xs">{activeWeek===week?'← Nåværende uke':''} {getPhase(activeWeek)?.name}</div>
        {/* This week's data */}
        <div className="bg-slate-800 rounded-2xl p-4">
          <div className="text-slate-300 font-bold mb-3">⚖️ Vekt – Uke {activeWeek}</div>
          <div className="text-slate-400 text-xs mb-2">Vei deg 3 morgener (etter toalett). Snitt brukes.</div>
          <div className="flex gap-2 mb-3">
            {(data.weights||[]).map((w,i)=>(
              <div key={i} className="flex-1 bg-slate-700 rounded-xl p-2 text-center">
                <div className="text-xs text-slate-400">Dag {i+1}</div>
                <div className="text-white font-black">{w} kg</div>
              </div>
            ))}
            {(data.weights||[]).length<3&&(
              <div className="flex gap-2 flex-1">
                <input type="number" step="0.1" placeholder="kg" value={newW} onChange={e=>setNewW(e.target.value)}
                  className="flex-1 bg-slate-700 border border-slate-600 text-white rounded-xl p-2 text-center text-sm min-w-0"/>
                <button onClick={()=>{addWeight(newW);setNewW('');}} className="bg-blue-600 text-white px-3 rounded-xl font-bold text-sm">+</button>
              </div>
            )}
          </div>
          {avgW&&<div className="bg-slate-700 rounded-xl p-3 text-center">
            <div className="text-slate-400 text-xs">Snitt denne uken</div>
            <div className="text-white font-black text-2xl">{avgW} kg</div>
            {ME.startWeight&&<div className="text-slate-400 text-xs">Endring: {(parseFloat(avgW)-ME.startWeight).toFixed(1)} kg</div>}
          </div>}
        </div>
        {/* Waist & sleep */}
        <div className="grid grid-cols-2 gap-3">
          <div className="bg-slate-800 rounded-2xl p-4">
            <div className="text-slate-300 text-sm font-bold mb-2">📏 Midje (cm)</div>
            <div className="text-slate-400 text-xs mb-2">Mål rundt navlen, mandag morgen</div>
            <input type="number" placeholder="cm" value={data.waist||''} onChange={e=>upd({waist:e.target.value})}
              className="w-full bg-slate-700 border border-slate-600 text-white rounded-xl p-2 text-center font-black text-xl"/>
          </div>
          <div className="bg-slate-800 rounded-2xl p-4">
            <div className="text-slate-300 text-sm font-bold mb-2">😴 Søvn 7+ timer</div>
            <div className="text-slate-400 text-xs mb-2">Netter med 7+ timer denne uken</div>
            <div className="flex gap-1 justify-center">
              {[0,1,2,3,4,5,6,7].map(n=>(
                <button key={n} onClick={()=>upd({sleep:n})}
                  className={`w-7 h-7 rounded-lg text-xs font-black ${(data.sleep||0)>=n&&n>0?'bg-purple-600 text-white':'bg-slate-700 text-slate-400'}`}>
                  {n||'0'}
                </button>
              ))}
            </div>
          </div>
        </div>
        {/* Workouts this week */}
        <div className="bg-slate-800 rounded-2xl p-4">
          <div className="text-slate-300 font-bold mb-2">💪 Økter – Uke {activeWeek}</div>
          {(()=>{
            const ws=weekSessions(wk);
            if(!ws.length)return<p className="text-slate-500 text-sm">Ingen loggede økter denne uken</p>;
            return ws.map((s,i)=>(<div key={i} className="flex justify-between py-2 border-b border-slate-700 last:border-0">
              <span className="text-white text-sm">{s.workoutTitle}</span>
              <span className="text-green-400 text-sm font-bold">✓</span>
            </div>));
          })()}
        </div>
        {/* Notes */}
        <div className="bg-slate-800 rounded-2xl p-4">
          <div className="text-slate-300 text-sm font-bold mb-2">📝 Kommentar uke {activeWeek}</div>
          <textarea rows={2} placeholder="Hvordan gikk det denne uken? Energi, søvn, kosthold..."
            value={data.note||''} onChange={e=>upd({note:e.target.value})}
            className="w-full bg-slate-700 border border-slate-600 text-white rounded-xl p-3 text-sm resize-none"/>
        </div>
        {/* 12-week overview table */}
        <div className="bg-slate-800 rounded-2xl p-4 mb-4">
          <div className="text-slate-300 font-bold mb-3">📈 12-ukers oversikt</div>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead><tr className="text-slate-400">
                <th className="text-left py-1 pr-2">Uke</th>
                <th className="text-center py-1 pr-2">Kg snitt</th>
                <th className="text-center py-1 pr-2">Midje</th>
                <th className="text-center py-1 pr-2">Økter</th>
                <th className="text-center py-1">Søvn</th>
              </tr></thead>
              <tbody>
                {Array.from({length:12},(_,i)=>i+1).map(w=>{
                  const d=prog[`w${w}`]||{};
                  const ws=weekSessions(`w${w}`);
                  const avg=d.weights?.length?(d.weights.reduce((a,b)=>a+b,0)/d.weights.length).toFixed(1):null;
                  return<tr key={w} className={`border-t border-slate-700 ${w===week?'bg-purple-900 bg-opacity-20':''}`}>
                    <td className="py-1.5 pr-2 text-slate-300 font-bold">{w}{w===week?'*':''}</td>
                    <td className="text-center pr-2 text-white">{avg||'—'}</td>
                    <td className="text-center pr-2 text-white">{d.waist?`${d.waist}cm`:'—'}</td>
                    <td className="text-center pr-2">{ws.length>0?<span className="text-green-400">{'✓'.repeat(Math.min(ws.length,3))}</span>:<span className="text-slate-600">···</span>}</td>
                    <td className="text-center text-slate-300">{d.sleep||'—'}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

              <div className="flex justify-between items-start mb-1">
                <div className="text-white font-bold">{s.name}</div>
                <span className="bg-slate-700 text-slate-300 text-xs px-2 py-1 rounded-lg">{s.dose}</span>
              </div>
              <div className="text-blue-400 text-xs font-medium mb-1">⏰ {s.when}</div>
              <div className="text-slate-400 text-sm">{s.note}</div>
            </div>
          ))}
          <div className="bg-slate-800 rounded-2xl p-4">
            <div className="text-slate-300 font-bold mb-2">💧 Morgenrutine</div>
            <div className="space-y-2 text-sm">
              <div className="text-slate-300">• 500 ml vann når du står opp</div>
              <div className="text-slate-300">• Kaffe er helt greit</div>
              <div className="text-slate-300">• Frokost med protein innen 1-2 timer</div>
              <div className="text-slate-400 text-xs mt-2">Vann med sitron, salt osv er greit for smak/hydrering, men ingen magisk fettforbrenner.</div>
            </div>
          </div>
        </>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// BOTTOM NAV
// ═══════════════════════════════════════════════════════════════

function BottomNav({active,onChange}){
  const tabs=[['today','🏠','I dag'],['workout','💪','Trening'],['food','🥗','Mat'],['progress','📊','Fremgang'],['plan','📋','Plan']];
  return(
    <nav className="bottom-nav">
      <div className="flex">
        {tabs.map(([id,icon,label])=>(
          <button key={id} onClick={()=>onChange(id)} className={`flex-1 flex flex-col items-center py-3 gap-0.5 transition-all ${active===id?'text-blue-400':'text-slate-500'}`}>
            <span className="text-xl leading-none">{icon}</span>
            <span className="text-xs font-medium">{label}</span>
          </button>
        ))}
      </div>
    </nav>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════

function App(){
  const[startDate,setStartDate]=useState(()=>load('fc_start',null));
  const[tab,setTab]=useState('today');
  const[workoutId,setWorkoutId]=useState(null);
  if(!startDate)return<SetupScreen onDone={d=>setStartDate(d)}/>;
  const goWorkout=id=>{setWorkoutId(id);setTab('workout');};
  const goFood=()=>setTab('food');
  return(
    <div>
      {tab==='today'&&<TodayScreen startDate={startDate} onGoWorkout={goWorkout} onGoFood={goFood}/>}
      {tab==='workout'&&<WorkoutScreen initialId={workoutId}/>}
      {tab==='food'&&<FoodScreen/>}
      {tab==='progress'&&<ProgressScreen startDate={startDate}/>}
      {tab==='plan'&&<PlanScreen startDate={startDate}/>}
      <BottomNav active={tab} onChange={t=>{if(t!=='workout')setWorkoutId(null);setTab(t);}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

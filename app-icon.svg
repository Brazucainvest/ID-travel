<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="gradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#060c18" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle border glow -->
  <rect width="512" height="512" rx="112" fill="none"
        stroke="url(#grad)" stroke-width="2" opacity="0.25"/>

  <!-- Center radial glow -->
  <circle cx="256" cy="256" r="220" fill="url(#centerGlow)"/>

  <!-- Background glow blob behind dumbbell -->
  <ellipse cx="256" cy="256" rx="200" ry="72"
           fill="#60a5fa" opacity="0.06" filter="url(#softGlow)"/>

  <!-- ===== DUMBBELL ===== -->

  <!-- Left outer plate (back shadow) -->
  <rect x="46" y="188" width="92" height="136" rx="24"
        fill="#1e3a6e" opacity="0.8"/>

  <!-- Left outer plate -->
  <rect x="50" y="184" width="90" height="132" rx="22"
        fill="url(#grad)" filter="url(#glow)"/>

  <!-- Left plate highlight -->
  <rect x="54" y="188" width="38" height="124" rx="16"
        fill="url(#gradLight)" opacity="0.22"/>

  <!-- Left collar -->
  <rect x="128" y="212" width="34" height="88" rx="10"
        fill="url(#grad)"/>

  <!-- Bar -->
  <rect x="158" y="230" width="196" height="52" rx="26"
        fill="url(#grad)"/>

  <!-- Bar shine -->
  <rect x="170" y="234" width="172" height="18" rx="9"
        fill="white" opacity="0.12"/>

  <!-- Right collar -->
  <rect x="350" y="212" width="34" height="88" rx="10"
        fill="url(#grad)"/>

  <!-- Right outer plate (back shadow) -->
  <rect x="374" y="188" width="92" height="136" rx="24"
        fill="#1e3a6e" opacity="0.8"/>

  <!-- Right outer plate -->
  <rect x="372" y="184" width="90" height="132" rx="22"
        fill="url(#grad)" filter="url(#glow)"/>

  <!-- Right plate highlight -->
  <rect x="376" y="188" width="38" height="124" rx="16"
        fill="url(#gradLight)" opacity="0.22"/>

  <!-- ===== "FC" text below dumbbell ===== -->
  <text x="256" y="388"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="72" font-weight="800" letter-spacing="8"
        text-anchor="middle" fill="url(#grad)" opacity="0.85">FC</text>

  <!-- Subtle bottom glow under text -->
  <ellipse cx="256" cy="400" rx="100" ry="18"
           fill="#a78bfa" opacity="0.08" filter="url(#softGlow)"/>
</svg>
